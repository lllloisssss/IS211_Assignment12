{% extends 'base.html' %}
{% block title %}Login – ClassTrack{% endblock %}

{% block content %}
<div style="max-width:380px; margin:4rem auto;">
  <div class="card">
    <h1 style="border:none; margin-bottom:1.5rem; text-align:center;">🔐 Teacher Login</h1>

    {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus placeholder="admin">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; margin-top:.5rem;">Log In</button>
    </form>
  </div>
</div>
{% endblock %}
